version: '3.8'

services:
  # Monitoring Server
  server:
    build:
      context: .
      dockerfile: Dockerfile
      target: server
    container_name: monitoring-server
    ports:
      - "8000:8000"
    volumes:
      - ./data:/app/data
      - ./logs:/app/logs
      - ./server:/app/server
      - ./templates:/app/templates
      - ./static:/app/static
    environment:
      - PYTHONUNBUFFERED=1
      - DATABASE_PATH=/app/data/monitoring.db
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    networks:
      - monitoring-network

  # Optional: Nginx reverse proxy for production
  nginx:
    image: nginx:alpine
    container_name: monitoring-nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./ssl:/etc/nginx/ssl:ro
    depends_on:
      - server
    restart: unless-stopped
    networks:
      - monitoring-network
    profiles:
      - production

networks:
  monitoring-network:
    driver: bridge

volumes:
  data:
  logs:
